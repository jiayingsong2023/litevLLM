default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
exclude: 'vllm/third_party/.*'
repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.0
  hooks:
  - id: ruff-check
    args: [--output-format, github, --fix]
  - id: ruff-format
- repo: https://github.com/crate-ci/typos
  rev: v1.38.1
  hooks:
  - id: typos
    args: [--force-exclude]
- repo: https://github.com/rhysd/actionlint
  rev: v1.7.7
  hooks:
  - id: actionlint
- repo: local
  hooks:
  - id: mypy-vllm
    name: Run mypy for FastInference runtime
    entry: uv run mypy vllm
    language: system
    types_or: [python, pyi]
    pass_filenames: false
  - id: forbid-direct-triton-import
    name: Forbid direct Triton imports
    entry: tools/pre_commit/check_triton_import.py
    language: system
    types: [python]
    pass_filenames: false
  - id: check-no-cpp-sources
    name: Enforce lite-only Python/Triton source tree
    entry: tools/pre_commit/check_no_cpp_sources.py
    language: system
    pass_filenames: false
  - id: check-filenames
    name: Check for spaces in tracked filenames
    entry: bash -c 'git ls-files | grep " " && echo "Filenames should not contain spaces!" && exit 1 || exit 0'
    language: system
    always_run: true
    pass_filenames: false
  - id: signoff-commit
    name: Sign-off Commit
    entry: bash
    args:
      - -c
      - |
        if ! grep -q "^Signed-off-by: $(git config user.name) <$(git config user.email)>" "$(git rev-parse --git-path COMMIT_EDITMSG)"; then
          printf "\nSigned-off-by: $(git config user.name) <$(git config user.email)>\n" >> "$(git rev-parse --git-path COMMIT_EDITMSG)"
        fi
    language: system
    verbose: true
    stages: [commit-msg]
