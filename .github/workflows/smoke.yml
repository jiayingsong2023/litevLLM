name: Smoke Tests

on:
  pull_request:
    paths:
      - "vllm/**/*.py"
      - "tests/smoke/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/smoke.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "vllm/**/*.py"
      - "tests/smoke/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Run smoke tests
        run: uv run pytest -q tests/smoke
