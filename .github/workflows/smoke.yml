name: Smoke Tests

on:
  pull_request:
    paths:
      - "vllm/**/*.py"
      - "tests/**/*.py"
      - "tests/*.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/smoke.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "vllm/**/*.py"
      - "tests/**/*.py"
      - "tests/*.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Run smoke tests
        run: uv run pytest -q tests/smoke

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync development dependencies
        run: uv sync --group dev

      - name: Run fast regression
        run: bash tests/run_regression_suite.sh

      - name: Check core runtime style
        run: >-
          uv run ruff check
          vllm/engine/async_llm.py
          vllm/engine/lite_engine.py
          vllm/engine/runtime_factory.py
          vllm/engine/runtime_controller.py
          vllm/engine/step_scheduler.py
          vllm/engine/request_scheduler.py
          vllm/engine/initialization
          tests/test_async_runtime_contracts.py
          tests/test_step_scheduler.py

      - name: Type-check concurrency contracts
        run: >-
          uv run mypy
          vllm/engine/async_llm.py
          vllm/engine/request_scheduler.py
